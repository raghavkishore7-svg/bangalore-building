<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Road Dig Madthini — Namma Bengaluru</title>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #f5f0e8;
    --dark: #1a1a1a;
    --red: #c0392b;
    --ink: #2c2c2c;
    --faded: #8a7f70;
    --paper: #ede8dc;
    --stamp-green: #1a6b3a;
  }

  body {
    background: var(--cream);
    font-family: 'Special Elite', 'Courier New', monospace;
    color: var(--ink);
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* ── SKYLINE SVG ── */
  .skyline {
    width: 100%;
    display: block;
    background: var(--cream);
  }

  /* ── HEADER ── */
  .ministry-header {
    background: var(--cream);
    border-bottom: 3px double var(--ink);
    padding: 18px 24px 14px;
    text-align: center;
    position: relative;
  }
  .ministry-header .seal {
    width: 64px; height: 64px;
    border: 3px solid var(--ink);
    border-radius: 50%;
    margin: 0 auto 10px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-size: 9px; line-height: 1.3;
    text-transform: uppercase; letter-spacing: 0.04em;
    position: relative;
  }
  .seal::before {
    content: '✦ ✦ ✦';
    position: absolute; top: 6px;
    font-size: 7px; letter-spacing: 2px;
  }
  .seal::after {
    content: '✦ ✦ ✦';
    position: absolute; bottom: 6px;
    font-size: 7px; letter-spacing: 2px;
  }
  .ministry-header h1 {
    font-size: clamp(18px, 4vw, 26px);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .ministry-header .sub {
    font-size: 11px; color: var(--faded);
    letter-spacing: 0.1em; text-transform: uppercase;
    margin-top: 4px;
  }

  /* ── METERS ── */
  .meters {
    display: flex; gap: 16px;
    padding: 14px 24px;
    border-bottom: 1px solid #c8bfaf;
    background: var(--paper);
    flex-wrap: wrap;
  }
  .meter {
    flex: 1; min-width: 160px;
  }
  .meter-label {
    font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.08em; margin-bottom: 5px;
    display: flex; justify-content: space-between;
  }
  .meter-label .val { font-weight: bold; }
  .meter-bar-bg {
    height: 14px; background: #d5ccbc;
    border: 1px solid #b0a090;
    position: relative; overflow: hidden;
  }
  .meter-bar-fill {
    height: 100%; width: 0%;
    transition: width 0.6s ease;
  }
  #commission-fill { background: var(--stamp-green); }
  #anger-fill { background: var(--red); }
  .meter-bar-bg::after {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      90deg, transparent 0, transparent 9%, rgba(0,0,0,0.08) 9%, rgba(0,0,0,0.08) 10%
    );
  }

  /* ── MAIN CARD AREA ── */
  .card-area {
    max-width: 680px;
    margin: 32px auto 0;
    padding: 0 20px;
  }

  /* ── FILE FOLDER CARD ── */
  .file-card {
    background: var(--paper);
    border: 1px solid #b0a090;
    box-shadow: 4px 4px 0 #c8bfaf, 8px 8px 0 #d5ccbc;
    padding: 32px 36px 28px;
    position: relative;
    animation: slideIn 0.35s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .file-card .folder-tab {
    position: absolute; top: -28px; left: 0;
    background: var(--paper);
    border: 1px solid #b0a090; border-bottom: none;
    padding: 5px 18px 6px;
    font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--faded);
  }
  .file-card .event-num {
    font-size: 11px; color: var(--faded);
    text-transform: uppercase; letter-spacing: 0.1em;
    margin-bottom: 10px;
  }
  .file-card h2 {
    font-size: clamp(16px, 3.5vw, 22px);
    margin-bottom: 16px;
    line-height: 1.3;
  }
  .file-card .event-body {
    font-family: 'Courier Prime', 'Courier New', monospace;
    font-size: 14px; line-height: 1.7;
    color: var(--ink);
    border-top: 1px dashed #b0a090;
    padding-top: 14px; margin-top: 4px;
  }
  .file-card .flavor {
    font-size: 12px; color: var(--faded);
    font-style: italic; margin-top: 10px;
  }

  /* ── CHOICES ── */
  .choices {
    margin-top: 28px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .choice-btn {
    background: var(--cream);
    border: 1px solid #b0a090;
    padding: 12px 16px;
    font-family: 'Special Elite', monospace;
    font-size: 13px;
    text-align: left;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    line-height: 1.4;
    color: var(--ink);
  }
  .choice-btn:hover {
    background: var(--dark);
    color: var(--cream);
    transform: translateX(4px);
  }
  .choice-btn .choice-label {
    font-size: 10px; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--faded);
    display: block; margin-bottom: 3px;
  }
  .choice-btn:hover .choice-label { color: #aaa; }

  /* ── REACTION TOAST ── */
  .reaction-toast {
    display: none;
    background: var(--ink);
    color: var(--cream);
    padding: 14px 20px;
    font-family: 'Courier Prime', monospace;
    font-size: 13px; line-height: 1.5;
    margin-top: 20px;
    border-left: 4px solid var(--red);
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .reaction-toast.show { display: block; }
  .next-btn {
    margin-top: 14px;
    background: var(--dark);
    color: var(--cream);
    border: none;
    padding: 10px 24px;
    font-family: 'Special Elite', monospace;
    font-size: 13px;
    cursor: pointer;
    letter-spacing: 0.06em;
  }
  .next-btn:hover { background: var(--red); }

  /* ── STAMPS ── */
  .stamp {
    display: inline-block;
    border: 3px solid;
    padding: 4px 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-size: 12px;
    font-weight: bold;
    transform: rotate(-4deg);
    opacity: 0.85;
    margin-left: 8px;
    vertical-align: middle;
  }
  .stamp-red { border-color: var(--red); color: var(--red); }
  .stamp-green { border-color: var(--stamp-green); color: var(--stamp-green); }

  /* ── INTRO SCREEN ── */
  .intro-screen .letterhead {
    text-align: center;
    border-bottom: 2px solid var(--ink);
    padding-bottom: 14px; margin-bottom: 18px;
  }
  .intro-screen .letterhead .dept {
    font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.12em; color: var(--faded);
  }
  .intro-screen .letterhead .doc-title {
    font-size: 20px; margin: 8px 0 4px;
  }
  .intro-screen .letter-body {
    font-family: 'Courier Prime', 'Courier New', monospace;
    font-size: 13px; line-height: 1.8;
  }
  .intro-screen .letter-body p { margin-bottom: 12px; }
  .intro-screen .letter-body .ref {
    font-size: 11px; color: var(--faded);
  }
  .start-btn {
    margin-top: 24px;
    background: var(--dark); color: var(--cream);
    border: none; padding: 14px 32px;
    font-family: 'Special Elite', monospace;
    font-size: 15px; cursor: pointer;
    letter-spacing: 0.08em;
    display: block; width: 100%;
  }
  .start-btn:hover { background: var(--red); }

  /* ── OUTCOME SCREEN ── */
  .outcome-screen {
    text-align: center;
  }
  .outcome-screen .cert-title {
    font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.15em; color: var(--faded);
    margin-bottom: 8px;
  }
  .outcome-screen h2 {
    font-size: clamp(20px, 5vw, 30px);
    margin-bottom: 20px; line-height: 1.2;
  }
  .outcome-screen .cert-border {
    border: 2px solid var(--ink);
    padding: 24px 20px;
    margin: 16px 0;
    position: relative;
  }
  .outcome-screen .cert-border::before,
  .outcome-screen .cert-border::after {
    content: '✦';
    position: absolute;
    font-size: 16px;
  }
  .outcome-screen .cert-border::before { top: -10px; left: 50%; transform: translateX(-50%); background: var(--paper); padding: 0 8px; }
  .outcome-screen .cert-border::after { bottom: -10px; left: 50%; transform: translateX(-50%); background: var(--paper); padding: 0 8px; }

  .stat-row {
    display: flex; justify-content: space-between;
    font-family: 'Courier Prime', monospace;
    font-size: 14px; padding: 7px 0;
    border-bottom: 1px dashed #c8bfaf;
  }
  .stat-row:last-child { border-bottom: none; }
  .stat-label { color: var(--faded); }
  .stat-val { font-weight: bold; }

  .rating-box {
    margin: 20px 0 10px;
    font-size: clamp(22px, 5vw, 32px);
  }
  .rating-sub {
    font-family: 'Courier Prime', monospace;
    font-size: 13px; color: var(--faded);
    margin-bottom: 24px;
  }
  .big-stamp {
    border: 4px solid var(--stamp-green);
    color: var(--stamp-green);
    display: inline-block;
    padding: 8px 20px;
    font-size: 22px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    transform: rotate(-5deg);
    margin: 10px 0 24px;
    opacity: 0.9;
  }
  .share-btn {
    background: var(--ink); color: var(--cream);
    border: none; padding: 12px 28px;
    font-family: 'Special Elite', monospace;
    font-size: 14px; cursor: pointer;
    letter-spacing: 0.06em; margin: 6px;
  }
  .share-btn:hover { background: var(--red); }
  .replay-btn {
    background: transparent; color: var(--ink);
    border: 1px solid var(--ink);
    padding: 12px 28px;
    font-family: 'Special Elite', monospace;
    font-size: 14px; cursor: pointer;
    letter-spacing: 0.06em; margin: 6px;
  }
  .replay-btn:hover { background: var(--ink); color: var(--cream); }

  /* ── PROGRESS DOTS ── */
  .progress-dots {
    display: flex; gap: 6px; justify-content: center;
    margin: 20px 0 0;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    border: 1px solid #b0a090;
    background: transparent;
    transition: background 0.3s;
  }
  .dot.done { background: var(--ink); }
  .dot.active { background: var(--red); border-color: var(--red); }
</style>
</head>
<body>

<svg class="skyline" viewBox="0 0 800 90" xmlns="http://www.w3.org/2000/svg">

  <rect x="340" y="50" width="120" height="40" fill="none" stroke="#b0a090" stroke-width="1.5"/>

<!-- MINISTRY HEADER -->
<div class="ministry-header">
  <div class="seal">
    <span style="font-size:18px">🏛️</span>
  </div>
  <h1>Ministry of Roads &amp; Unnecessary Excavation</h1>
  <div class="sub">Bruhat Bengaluru Mahanagara Palike &nbsp;|&nbsp; Est. "Since Always"</div>
</div>

<!-- METERS -->
<div class="meters">
  <div class="meter">
    <div class="meter-label">
      <span>₹ Your Commission</span>
      <span class="val" id="commission-val">0 cr</span>
    </div>
    <div class="meter-bar-bg">
      <div class="meter-bar-fill" id="commission-fill"></div>
    </div>
  </div>
  <div class="meter">
    <div class="meter-label">
      <span>Public Anger</span>
      <span class="val" id="anger-val">0%</span>
    </div>
    <div class="meter-bar-bg">
      <div class="meter-bar-fill" id="anger-fill"></div>
    </div>
  </div>
</div>

<!-- PROGRESS DOTS -->
<div class="progress-dots" id="progress-dots"></div>

<!-- MAIN CARD AREA -->
<div class="card-area" id="card-area"></div>

<script>
// ── GAME STATE ──
let state = {
  commission: 0,   // 0–100
  anger: 0,        // 0–100
  eventIndex: -1,  // -1 = intro
  awaitingNext: false,
};

// ── EVENTS DATA ──
const EVENTS = [
  {
    tab: "File No. 1 / Tender",
    title: "Tender Time",
    body: `The MG Road project has been approved by the committee. Budget: ₹47 crore. Timeline: 3 months.\n\nNow, who gets the contract?`,
    flavor: `(The file has been sitting on your desk for 14 months. Nobody noticed.)`,
    choices: [
      {
        label: "Award to your brother-in-law's firm, 'Sri Excavation Pvt Ltd'",
        commission: 28, anger: 10,
        reaction: `Done. Sri Excavation Pvt Ltd has exactly 2 employees and a JCB purchased on EMI. They've already subcontracted the work to someone else for half the amount. Classic.\n\n📰 Deccan Herald: "Tender awarded in record time. No transparency report available."`
      },
      {
        label: "Open tender — let the best firm win",
        commission: 4, anger: 3,
        reaction: `Admirable. Completely useless. The tender process will take 18 months. The lowest bidder will quote ₹12 crore, disappear after collecting advance, and reappear as a different company next year.\n\n😐 Nothing happens. This is Bangalore.`
      },
      {
        label: "Award to your brother-in-law's firm, but rename it to 'BengaluruInfra Solutions'",
        commission: 28, anger: 4,
        reaction: `Brilliant move, Minister. The firm was renamed on Thursday. Contract awarded on Friday. Investigation started on Saturday — but the investigating officer was transferred on Sunday.\n\n✅ No questions asked. Commission secured.`
      },
    ]
  },
  {
    tab: "File No. 2 / Public",
    title: "Citizens Complain",
    body: `Residents of Indiranagar have submitted a petition. They want to know: why is MG Road being dug? It was resurfaced just 3 years ago.\n\nYour press secretary is waiting for instructions.`,
    flavor: `The petition has 4,200 signatures and a very angry cover letter in Kannada.`,
    choices: [
      {
        label: "Blame the previous government",
        commission: 0, anger: 6,
        reaction: `"The Congress government of 1994 laid substandard pipes. We are rectifying their mistakes. This is a gift to the people of Bengaluru."\n\nThe press conference lasted 45 minutes. Nobody asked a follow-up question. It worked.`
      },
      {
        label: "Say it's for a 'Smart City Project'",
        commission: 0, anger: 4,
        reaction: `PRESS RELEASE: "MG Road will be part of Bengaluru's ₹2,100 crore Smart City corridor, featuring IoT-enabled potholes and AI-powered traffic signals."\n\nA startup from Koramangala tweeted their support. TiE Bangalore invited you to speak.`
      },
      {
        label: "Ignore. Block their Twitter replies.",
        commission: 0, anger: 14,
        reaction: `400 new Twitter accounts created in Indiranagar. One resident's thread went viral.\n\nBut you've seen this before. In 72 hours, there will be a new controversy somewhere else. Patience, Minister.\n\n🐦 Trending: #DigBangaloreDigDeeper`
      },
    ]
  },
  {
    tab: "File No. 3 / Media",
    title: "Breaking News",
    body: `A journalist from The Hindu has filed 3 RTI requests about the tender process. She is outside your office and would like to speak with you.\n\nYour PA says she has a notebook AND a camera.`,
    flavor: `(She also has 80,000 Twitter followers. Noted.)`,
    choices: [
      {
        label: "Invite her for tea and a 'site visit' — then a nice lunch",
        commission: -6, anger: -5,
        reaction: `Excellent. Post-lunch, the article became: "Minister personally inspects MG Road project, commits to transparency."\n\nThe RTI responses will be delayed by 90 days citing "sensitive government information." Standard procedure.\n\n☕ Relationship: Built.`
      },
      {
        label: "Transfer the journalist to the Gulbarga agriculture beat",
        commission: 0, anger: 18,
        reaction: `You don't have authority over journalists. But you called her editor.\n\nShe's still at Bengaluru bureau. Her article is now longer. She's added a section on "intimidation of press."\n\n📺 NDTV picked it up. This was a mistake, Minister.`
      },
      {
        label: "Hold a press conference: 'This project creates 600 local jobs'",
        commission: 0, anger: 2,
        reaction: `The 600 jobs include: 2 JCB operators, 1 site supervisor, 597 "support staff" who will never be traceable.\n\nPrint media ran the headline as given. The journalist published anyway. But it's buried on page 8.\n\n📄 Page 8 is fine.`
      },
    ]
  },
  {
    tab: "File No. 4 / Monsoon",
    title: "Monsoon Has Entered the Chat",
    body: `It is June. The dug-up MG Road has filled with rainwater. Two motorbikes have sunk. The BBMP work crew has not been seen since May 31st.\n\nA photo of a man rowing a boat on MG Road is trending.`,
    flavor: `"Yaake madthira? Commission beku!" — Overheard at BBMP office`,
    choices: [
      {
        label: "Blame climate change and 'unprecedented rainfall'",
        commission: 0, anger: 8,
        reaction: `"Bengaluru received 340% excess rainfall this June," your statement reads.\n\nIMD data shows it rained normally. But nobody checked IMD.\n\n🌧️ Statement accepted by 60% of news channels. Good enough.`
      },
      {
        label: "Blame non-Bangaloreans for 'overloading the drainage system'",
        commission: 0, anger: 22,
        reaction: `This was a mistake. Kannadigas AND non-Kannadigas are both angry.\n\n"Outsiders came to our city and brought their rain with them?" – Viral meme.\n\n💀 Twitter ratio: 1 like, 4,000 quote tweets. Rough day.`
      },
      {
        label: "Organise a boat photo op — 'Minister surveys flood situation'",
        commission: 0, anger: -6,
        reaction: `Genius. Pure genius.\n\nYou sat in a boat on MG Road wearing a white kurta and a very concerned expression. The photos went everywhere.\n\n📸 Headlines: "Minister wades into crisis, takes personal stock." Public anger briefly replaced by bewilderment. A net positive.`
      },
    ]
  },
  {
    tab: "File No. 5 / G20",
    title: "G20 Summit Alert",
    body: `The Ministry of External Affairs has informed you that a foreign delegation will drive past MG Road on Thursday.\n\nThe road is currently a 400-metre open trench filled with mud, cable wire, and one abandoned cement mixer.`,
    flavor: `The delegation includes the infrastructure minister of Germany. He has a blog.`,
    choices: [
      {
        label: "Fill the trench with mud, paint the mud black, call it 'road surface'",
        commission: 0, anger: 4,
        reaction: `The convoy passed at 60 km/h. Nobody noticed.\n\nThe German minister's blog post: "Impressive pace of development in Bengaluru." He did not get out of the car.\n\n🇩🇪 Crisis averted. The mud will last until Thursday evening.`
      },
      {
        label: "Put barricades around it and label it 'Heritage Infrastructure Art Installation'",
        commission: 8, anger: -2,
        reaction: `A local art collective enthusiastically endorsed this. A Bengaluru startup offered to build an app around it.\n\nVogue India called it "post-colonial urban expression."\n\n🎨 You've accidentally created culture. Commission from the barricade supplier: secured.`
      },
      {
        label: "Re-route the VIP convoy through Whitefield instead",
        commission: 0, anger: -4,
        reaction: `The convoy hit a 2-hour traffic jam on Whitefield Main Road.\n\nThe German minister's blog post: "I sat in traffic for 2 hours and watched 4 JCBs dig a road with no visible purpose. Faszinierend."\n\n🚦 An honest experience of Bengaluru. Respect.`
      },
    ]
  },
  {
    tab: "File No. 6 / Elections",
    title: "Elections Incoming",
    body: `The Chief Minister's office has called. The Karnataka state elections are in 6 weeks. The CM wants MG Road "done" before the campaign rally.\n\n"Done" meaning: looks done. From a distance. Preferably at dusk.`,
    flavor: `This project was supposed to finish in 3 months. It has been 2 years.`,
    choices: [
      {
        label: "Hire 400 workers, run 24-hour shifts — actually finish the road",
        commission: -22, anger: -8,
        reaction: `The road is done. It is actually good. Citizens are confused.\n\nUnexpected side effect: people are asking why all roads can't be done this way. You've accidentally raised expectations.\n\n😬 Your commission took a hit, but your performance review will be immaculate.`
      },
      {
        label: "Lay 2 inches of tar on top of the open trench and call it 'Phase 1 Complete'",
        commission: 18, anger: 10,
        reaction: `It looks like a road. For now.\n\nThe tar will crack in 3 weeks. But the election will be in 6 weeks, so: fine. The next government can deal with it.\n\n✅ Phase 1: COMPLETE (officially). Phase 2 budget: already being drafted.`
      },
      {
        label: "Inaugurate the 'work in progress' with a ribbon-cutting ceremony",
        commission: 0, anger: 14,
        reaction: `You cut a ribbon over an open trench.\n\nThe CM smiled for photos. You smiled for photos. A JCB was decorated with marigolds.\n\nCitizens uploaded videos. It became a meme template within the hour.\n\n🎀 Trend: #RibbonOnTheTrench`
      },
    ]
  },
  {
    tab: "File No. 7 / Audit",
    title: "The CAG Cometh",
    body: `The Comptroller and Auditor General has requested the MG Road project file: all expenditure records, contractor agreements, and progress reports.\n\nYour office has 48 hours to respond.`,
    flavor: `File reference: MR/BBMP/2021/0047-A. Last known location: unknown.`,
    choices: [
      {
        label: "The file was 'lost in the 2019 floods'",
        commission: 0, anger: 5,
        reaction: `"The 2019 floods caused extensive damage to government records across 14 departments."\n\nThe CAG notes that 2019 was a relatively dry year in Bengaluru. However, they cannot prove the file wasn't flooded.\n\n📁 Investigation: suspended pending further evidence.`
      },
      {
        label: "Create a new file backdated to 2021 — everything looks clean",
        commission: 0, anger: 2,
        reaction: `The file is immaculate. Signed by officers who were on leave that week. Witnessed by a stamp that stopped being used in 2020.\n\nThe CAG team is junior. They flag it. Their manager tells them not to make a big deal.\n\n📋 Submitted. Accepted. Noted.`
      },
      {
        label: "Transfer the auditor to the Fisheries Department, Mangaluru",
        commission: 0, anger: 6,
        reaction: `You cannot transfer a CAG officer.\n\nHowever, his reporting manager received a call. The audit has been "deprioritised" in favour of a larger highways project.\n\n🐟 The auditor is now looking at fish subsidies. He seems happier.`
      },
    ]
  },
  {
    tab: "File No. 8 / Complete",
    title: "Project 'Complete'",
    body: `MG Road is — by all official metrics — done.\n\nOriginal budget: ₹47 crore. Final bill: ₹138 crore. Original timeline: 3 months. Actual duration: 4 years, 2 months.\n\nWhat is your final act as project minister?`,
    flavor: `The road surface has the consistency of paratha. Smooth on top, questionable underneath.`,
    choices: [
      {
        label: "Announce Phase 2: 'Water pipe replacement below the new road'",
        commission: 32, anger: 16,
        reaction: `The Phase 2 file was pre-drafted in 2022.\n\nWork begins Monday. The same crew. The same contractor. A new file number.\n\n♻️ The circle of life. MG Road will be dug again. It was always going to be dug again.`
      },
      {
        label: "Announce Road Widening: 'MG Road to become a 6-lane corridor'",
        commission: 28, anger: 12,
        reaction: `"Bengaluru's Future Is Wide," reads your press release.\n\nA row of 60-year-old rain trees will need to be cut. An environmental clearance will take 3 weeks — or 3 days with the right approvals.\n\n🌳 Trees: outvoted. Commission: incoming.`
      },
      {
        label: "Take a selfie with the road and post it: 'Namma MG Road, done!'",
        commission: 0, anger: -5,
        reaction: `17,000 likes in 4 hours. The Chief Minister retweeted it.\n\nSomeone in the comments pointed out the road is already cracking near the median. You've muted that account.\n\n📱 The selfie has become your profile picture. Legacy secured.`
      },
    ]
  },
];

// ── RATINGS ──
function getRating(commission, anger) {
  const score = commission - anger * 0.5;
  if (score >= 80) return { title: "Legend of Loot 👑", sub: "You are a generational talent in public mismanagement. Statues will be built. Then torn down. Then rebuilt." };
  if (score >= 50) return { title: "Namma Minister ⭐", sub: "Competently corrupt. The voters respect the hustle. You will win the next election." };
  if (score >= 20) return { title: "Amateur Hour 📋", sub: "You took some commission but also felt guilty. This is Bengaluru public service — there is no room for guilt." };
  if (score >= 0)  return { title: "Accidental Idealist 😮", sub: "You tried to do the right thing. The road is mostly built. Nobody knows what to do with you." };
  return { title: "Transferred to Gulbarga 🚌", sub: "You have been transferred. The new minister has already started Phase 2." };
}

// ── UI HELPERS ──
function setMeter(id, val, valId, suffix) {
  const pct = Math.min(100, Math.max(0, val));
  document.getElementById(id).style.width = pct + '%';
  document.getElementById(valId).textContent = Math.round(val) + suffix;
}

function updateMeters() {
  setMeter('commission-fill', state.commission, 'commission-val', ' cr');
  setMeter('anger-fill', state.anger, 'anger-val', '%');
}

function buildDots() {
  const container = document.getElementById('progress-dots');
  container.innerHTML = '';
  EVENTS.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i < state.eventIndex ? ' done' : i === state.eventIndex ? ' active' : '');
    container.appendChild(d);
  });
}

// ── SCREENS ──
function renderIntro() {
  state.eventIndex = -1;
  document.getElementById('progress-dots').innerHTML = EVENTS.map(() => `<div class="dot"></div>`).join('');
  document.getElementById('card-area').innerHTML = `
    <div class="file-card intro-screen">
      <div class="folder-tab">CONFIDENTIAL</div>
      <div class="letterhead">
        <div class="dept">Government of Karnataka &nbsp;·&nbsp; Roads &amp; Infrastructure Division</div>
        <div class="doc-title">APPOINTMENT ORDER</div>
        <div class="dept">Ref: RID/MR/2024/MINISTER/001</div>
      </div>
      <div class="letter-body">
        <p>Congratulations, <strong>Sri. You</strong>.</p>
        <p>You have been appointed as the <strong>Special Project Minister for MG Road Restoration, Phase 7</strong>.</p>
        <p>The road was last dug in 2021 for fibre optic cables. In 2022 for water pipes. In 2023 for a Metro utility shift. It is now <strong>your turn</strong>.</p>
        <p>Budget sanctioned: <strong>₹47 crore</strong>.<br>
        Timeline: <strong>3 months</strong>.<br>
        Actual expected duration: however long it takes you to retire.</p>
        <p class="ref">Note: This appointment is subject to the discretion of the Chief Minister, the coalition government, the monsoon, and contractor availability.</p>
        <p>Best of luck, Minister. <em>Bengaluru is watching.</em><br>(Not really. They're stuck in traffic.)</p>
      </div>
      <button class="start-btn" onclick="startGame()">📂 OPEN PROJECT FILE</button>
    </div>`;
}

function renderEvent(idx) {
  state.eventIndex = idx;
  buildDots();
  const ev = EVENTS[idx];
  document.getElementById('card-area').innerHTML = `
    <div class="file-card">
      <div class="folder-tab">${ev.tab}</div>
      <div class="event-num">Event ${idx + 1} of ${EVENTS.length}</div>
      <h2>${ev.title}</h2>
      <div class="event-body">${ev.body.replace(/\n/g, '<br>')}<div class="flavor">${ev.flavor}</div></div>
      <div class="choices">
        ${ev.choices.map((c, ci) => `
          <button class="choice-btn" onclick="choose(${idx}, ${ci})">
            <span class="choice-label">Option ${String.fromCharCode(65+ci)}</span>
            ${c.label}
          </button>`).join('')}
      </div>
      <div class="reaction-toast" id="reaction-toast"></div>
    </div>`;
}

function choose(eventIdx, choiceIdx) {
  if (state.awaitingNext) return;
  state.awaitingNext = true;

  const choice = EVENTS[eventIdx].choices[choiceIdx];
  state.commission = Math.min(100, Math.max(0, state.commission + choice.commission));
  state.anger = Math.min(100, Math.max(0, state.anger + choice.anger));
  updateMeters();

  // disable buttons
  document.querySelectorAll('.choice-btn').forEach(b => {
    b.style.opacity = '0.4'; b.style.pointerEvents = 'none';
  });

  const toast = document.getElementById('reaction-toast');
  toast.innerHTML = choice.reaction.replace(/\n/g, '<br>') +
    `<br><br><button class="next-btn" onclick="nextEvent()">
      ${eventIdx < EVENTS.length - 1 ? 'Next →' : 'See Results →'}
    </button>`;
  toast.classList.add('show');
}

function nextEvent() {
  state.awaitingNext = false;
  if (state.eventIndex < EVENTS.length - 1) {
    renderEvent(state.eventIndex + 1);
  } else {
    renderOutcome();
  }
}

function renderOutcome() {
  const rating = getRating(state.commission, state.anger);
  const shareText = `I played Road Dig Madthini and earned ₹${Math.round(state.commission)} cr commission with ${Math.round(state.anger)}% public anger. Rating: ${rating.title}. Namma Bengaluru! 🚧`;

  document.getElementById('progress-dots').innerHTML = EVENTS.map(() => `<div class="dot done"></div>`).join('');
  document.getElementById('card-area').innerHTML = `
    <div class="file-card outcome-screen">
      <div class="folder-tab">Project File — CLOSED</div>
      <div class="cert-title">Government of Karnataka &nbsp;·&nbsp; Official Project Record</div>
      <h2>MG Road Phase 7<br>"Complete"</h2>
      <div class="big-stamp">APPROVED</div>
      <div class="cert-border">
        <div class="stat-row"><span class="stat-label">Original Budget</span><span class="stat-val">₹47 crore</span></div>
        <div class="stat-row"><span class="stat-label">Final Expenditure</span><span class="stat-val">₹138 crore</span></div>
        <div class="stat-row"><span class="stat-label">Your Commission</span><span class="stat-val">₹${Math.round(state.commission)} cr</span></div>
        <div class="stat-row"><span class="stat-label">Public Anger Level</span><span class="stat-val">${Math.round(state.anger)}%</span></div>
        <div class="stat-row"><span class="stat-label">Planned Duration</span><span class="stat-val">3 months</span></div>
        <div class="stat-row"><span class="stat-label">Actual Duration</span><span class="stat-val">4 years, 2 months</span></div>
        <div class="stat-row"><span class="stat-label">Trees Cut</span><span class="stat-val">Several</span></div>
        <div class="stat-row"><span class="stat-label">Complaints Resolved</span><span class="stat-val">0</span></div>
      </div>
      <div class="rating-box">${rating.title}</div>
      <div class="rating-sub">${rating.sub}</div>
      <div>
        <button class="share-btn" onclick="shareResult('${encodeURIComponent(shareText)}')">📤 Share on Twitter</button>
        <button class="share-btn" onclick="copyResult('${encodeURIComponent(shareText)}')">📋 Copy Result</button>
        <button class="replay-btn" onclick="startGame()">🔄 Play Again</button>
      </div>
      <p style="font-size:11px; color:#8a7f70; margin-top:24px; font-family:'Courier Prime',monospace;">
        Phase 8 has already been approved.<br>
        Dig begins Monday.
      </p>
    </div>`;
}

// ── SHARE ──
function shareResult(encodedText) {
  window.open('https://twitter.com/intent/tweet?text=' + encodedText, '_blank');
}
function copyResult(encodedText) {
  navigator.clipboard.writeText(decodeURIComponent(encodedText)).then(() => {
    alert('Result copied! Share it anywhere.');
  });
}

// ── START ──
function startGame() {
  state = { commission: 0, anger: 0, eventIndex: -1, awaitingNext: false };
  updateMeters();
  renderEvent(0);
}

// ── INIT ──
updateMeters();
renderIntro();
</script>
</body>
</html>
